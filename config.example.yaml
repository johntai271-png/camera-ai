# --- DASHBOARD WEB (xem trên trình duyệt máy tính / điện thoại cùng WiFi) ---
dashboard:
  enabled: true
  host: "0.0.0.0"      # 0.0.0.0 = điện thoại cùng WiFi vào xem được
  port: 8090           # mở:  http://localhost:8090
  password: ""         # đặt mật khẩu nếu WiFi có người lạ dùng chung (trống = không hỏi)

# --- TỰ DỌN DUNG LƯỢNG (ảnh cảnh báo + video sự kiện; KHÔNG đụng ảnh người nhà) ---
storage:
  enabled: true
  max_days: 14         # xoá file cũ hơn số ngày này
  max_gb: 10           # tổng vượt số GB này thì xoá dần từ cũ nhất
